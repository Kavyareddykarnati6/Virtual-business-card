<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kavyareddy Karnati | Digital Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --dark: #0f172a;
            --light: #f8fafc;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* --- 3D Card Styling --- */
        .card {
            width: 100%;
            height: 500px;
            perspective: 1000px;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 24px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card-back {
            transform: rotateY(180deg);
            justify-content: center;
            align-items: center;
            background: white;
            color: var(--dark);
        }

        /* Header Design */
        .header-design {
            height: 120px;
            background: linear-gradient(45deg, #6366f1, #a855f7);
            clip-path: polygon(0 0, 100% 0, 100% 70%, 0 100%);
        }

        .profile-img {
            width: 100px;
            height: 100px;
            background: #cbd5e1;
            border: 4px solid var(--dark);
            border-radius: 50%;
            margin: -60px auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .name { margin: 0; font-size: 1.5rem; font-weight: 600; }
        .title { color: #94a3b8; margin: 5px 0 20px; font-size: 0.9rem; }

        .contact-info {
            text-align: left;
            padding: 0 30px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            font-size: 0.85rem;
        }

        .contact-item a { color: var(--light); text-decoration: none; }

        /* QR Section */
        #qrcode { padding: 15px; background: white; border-radius: 15px; }

        /* Buttons */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        
        button {
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .copy-btn { background: #334155; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card" id="card" onclick="flipCard()">
            <div class="card-inner">
                <div class="card-front">
                    <div class="header-design"></div>
                    <div class="profile-img">👩‍💻</div>
                    <h1 class="name">Kavyareddy Karnati</h1>
                    <p class="title">Software Developer</p>
                    
                    <div class="contact-info">
                        <div class="contact-item">
                            <span>📧</span>
                            <p>kavyareddy@example.com</p>
                        </div>
                        <div class="contact-item">
                            <span>📱</span>
                            <p>+91 9876543210</p>
                        </div>
                        <div class="contact-item">
                            <span>🌐</span>
                            <a href="#">kavyareddy.dev</a>
                        </div>
                    </div>
                </div>

                <div class="card-back">
                    <h3 style="margin-bottom: 10px;">Scan to Connect</h3>
                    <div id="qrcode"></div>
                    <p style="font-size: 0.8rem; margin-top: 15px;">Tap to Flip Back</p>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="copyLink()" class="copy-btn">📋 Copy URL</button>
            <button onclick="shareWhatsApp()">💬 WhatsApp</button>
            <button onclick="downloadQR()" style="grid-column: span 2; background: #a855f7;">⬇️ Download QR Code</button>
        </div>
    </div>

    <script>
        const currentUrl = window.location.href;
        
        // QR Generation
        new QRCode(document.getElementById("qrcode"), {
            text: currentUrl,
            width: 180,
            height: 180,
            colorDark: "#0f172a"
        });

        function flipCard() {
            document.getElementById('card').classList.toggle('flipped');
        }

        function copyLink() {
            navigator.clipboard.writeText(currentUrl);
            alert("Link copied to clipboard!");
        }

        function shareWhatsApp() {
            const text = encodeURIComponent("Check out my Digital Business Card: " + currentUrl);
            window.open(`https://wa.me/?text=${text}`, '_blank');
        }

        function downloadQR() {
            const qrImg = document.querySelector('#qrcode img');
            const link = document.createElement('a');
            link.download = 'Kavya-Business-Card-QR.png';
            link.href = qrImg.src;
            link.click();
        }
    </script>
</body>
</html>
